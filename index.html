<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professionel Service</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --light: #f8f9fa;
    --gray: #6c757d;
    --white: #ffffff;
  }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--primary); overflow-x: hidden; }
  html { scroll-behavior: smooth; }

  /* NAV */
  nav {
    position: fixed; top: 0; width: 100%; background: rgba(26,26,46,0.97);
    backdrop-filter: blur(10px); z-index: 1000; padding: 18px 5%;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .logo { color: var(--white); font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; }
  .logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 30px; list-style: none; }
  .nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: color 0.3s; }
  .nav-links a:hover { color: var(--accent); }

  /* HERO */
  .hero {
    min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex; align-items: center; justify-content: center; text-align: center;
    padding: 100px 5% 60px; position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at center, rgba(233,69,96,0.15) 0%, transparent 60%);
    animation: pulse 6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:0.5} 50%{transform:scale(1.1);opacity:1} }
  .hero-content { position: relative; z-index: 1; max-width: 800px; }
  .hero-badge {
    display: inline-block; background: rgba(233,69,96,0.2); border: 1px solid rgba(233,69,96,0.5);
    color: var(--accent); padding: 8px 20px; border-radius: 50px; font-size: 0.85rem;
    font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px;
  }
  .hero h1 { color: var(--white); font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 900; line-height: 1.2; margin-bottom: 20px; }
  .hero h1 span { color: var(--accent); }
  .hero p { color: rgba(255,255,255,0.75); font-size: clamp(1rem, 2vw, 1.25rem); line-height: 1.8; margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto; }
  .hero-btns { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    background: var(--accent); color: var(--white); padding: 16px 40px;
    border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 1rem;
    transition: all 0.3s; box-shadow: 0 8px 25px rgba(233,69,96,0.4);
  }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(233,69,96,0.5); background: #c73652; }
  .btn-secondary {
    background: transparent; color: var(--white); padding: 16px 40px;
    border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 1rem;
    border: 2px solid rgba(255,255,255,0.3); transition: all 0.3s;
  }
  .btn-secondary:hover { border-color: var(--white); background: rgba(255,255,255,0.1); transform: translateY(-3px); }
  .hero-stats { display: flex; gap: 50px; justify-content: center; margin-top: 60px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-number { color: var(--white); font-size: 2.5rem; font-weight: 900; display: block; }
  .stat-number span { color: var(--accent); }
  .stat-label { color: rgba(255,255,255,0.6); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

  /* SERVICES */
  .services { padding: 100px 5%; background: var(--light); }
  .section-header { text-align: center; margin-bottom: 60px; }
  .section-tag { color: var(--accent); font-size: 0.85rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; display: block; margin-bottom: 12px; }
  .section-header h2 { font-size: clamp(1.8rem, 3vw, 2.8rem); font-weight: 900; color: var(--primary); margin-bottom: 15px; }
  .section-header p { color: var(--gray); font-size: 1.1rem; max-width: 550px; margin: 0 auto; line-height: 1.7; }
  .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
  .service-card {
    background: var(--white); border-radius: 20px; padding: 40px 35px;
    box-shadow: 0 5px 30px rgba(0,0,0,0.07); transition: all 0.4s;
    border: 2px solid transparent; position: relative; overflow: hidden;
  }
  .service-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--accent), #ff6b6b);
    transform: scaleX(0); transition: transform 0.4s; transform-origin: left;
  }
  .service-card:hover::before { transform: scaleX(1); }
  .service-card:hover { transform: translateY(-8px); box-shadow: 0 20px 50px rgba(0,0,0,0.12); border-color: rgba(233,69,96,0.1); }
  .service
