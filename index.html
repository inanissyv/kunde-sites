<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professionelle Services</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: white;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  border-bottom: 1px solid #ddd;
}

/* HERO */
.hero {
  margin-top: 70px;
  min-height: calc(100vh - 70px);
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 40px;
}

/* FIX: fjern overlays helt */
.hero::before,
.hero::after {
  display: none;
}

.hero-content {
  max-width: 600px;
}

h1 {
  font-size: 40px;
  margin-bottom: 20px;
}

p {
  font-size: 18px;
  opacity: 0.8;
}
</style>
</head>

<body>

<nav>
  <div>Professionelle Services</div>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>Få flere kunder</h1>
    <p>Vi laver din hjemmeside og skaffer dig kunder automatisk</p>
  </div>
</section>

</body>
</html>
