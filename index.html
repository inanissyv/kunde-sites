<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professionel Virksomhed</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
color: #333;
line-height: 1.6;
}
nav {
position: fixed;
top: 0;
width: 100%;
background: rgba(10, 10, 30, 0.95);
padding: 18px 40px;
display: flex;
justify-content: space-between;
align-items: center;
z-index: 1000;
box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.nav-logo {
color: #fff;
font-size: 1.5rem;
font-weight: 700;
letter-spacing: 1px;
}
.nav-logo span {
color: #4f8ef7;
}
.nav-links {
display: flex;
gap: 30px;
list-style: none;
}
.nav-links a {
color: #ccc;
text-decoration: none;
font-size: 0.95rem;
transition: color 0.3s;
}
.nav-links a:hover {
color: #4f8ef7;
}
.hero {
min-height: 100vh;
background: linear-gradient(135deg, #0a0a1e 0%, #0d1b4b 50%, #1a0a3e 100%);
display: flex;
align-items: center;
justify-content: center;
text-align: center;
padding: 120px 20px 80px;
position: relative;
overflow: hidden;
}
.hero::before {
content: '';
position: absolute;
width: 600px;
height: 600px;
background: radial-gradient(circle, rgba(79,142,247,0.15) 0%, transparent 70%);
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
pointer-events: none;
}
.hero-content {
max-width: 800px;
position: relative;
z-index: 1;
}
.hero-badge {
display: inline-block;
background: rgba(79,142,247,0.2);
border: 1px solid rgba(79,142,247,0.4);
color: #4f8ef7;
padding: 8px 20px;
border-radius: 30px;
font-size: 0.85rem;
margin-bottom: 24px;
letter-spacing: 2px;
text-transform: uppercase;
}
.hero h1 {
font-size: 3.5rem;
color: #fff;
font-weight: 800;
line-height: 1.2;
margin-bottom: 20px;
}
.hero h1 span {
background: linear-gradient(90deg, #4f8ef7, #a78bfa);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}
.hero p {
font-size: 1.2rem;
color: #aab4c8;
max-width: 600px;
margin: 0 auto 40px;
}
.hero-buttons {
display: flex;
gap: 16px;
justify-content: center;
flex-wrap: wrap;
}
.btn-primary {
background: linear-gradient(135deg, #4f8ef7, #7c3aed);
color: #fff;
padding: 14px 36px;
border: none;
border-radius: 8px;
font-size: 1rem;
font-weight: 600;
cursor: pointer;
text-decoration: none;
transition: transform 0.3s, box-shadow 0.3s;
display: inline-block;
}
.btn-primary:hover {
transform: translateY(-2px);
box-shadow: 0 8px 25px rgba(79,142,247,0.4);
}
.btn-secondary {
background: transparent;
color: #fff;
padding: 14px 36px;
border: 2px solid rgba(255,255,255,0.3);
border-radius: 8px;
font-size: 1rem;
font-weight: 600;
cursor: pointer;
text-decoration: none;
transition: border-color 0.3s, background 0.3s;
display: inline-block;
}
.btn-secondary:hover {
border-color: #4f8ef7;
background: rgba(79,142,247,0.1);
}
.stats {
display: flex;
justify-content: center;
gap: 60px;
margin-top: 70px;
flex-wrap: wrap;
}
.stat-item {
text-align: center;
}
.stat-number {
font-size: 2.5rem;
font-weight: 800;
color: #4f8ef7;
display: block;
}
.stat-label {
color: #7a8aaa;
font-size: 0.85rem;
text-transform: uppercase;
letter-spacing: 1px;
}
.services {
padding: 100px 20px;
background: #f8f9ff;
}
.section-header {
text-align: center;
margin-bottom: 60px;
}
.section-tag {
display: inline-block;
background: #e8f0fe;
color: #4f8ef7;
padding: 6px 16px;
border-radius: 20px;
font-size: 0.8rem;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 16px;
}
.section-header h2 {
font-size: 2.5rem;
color: #0a0a1e;
font-weight: 800;
margin-bottom: 16px;
}
.section-header p {
color: #666;
font-size: 1.1rem;
max-width: 550px;
margin: 0 auto;
}
.services-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
gap: 30px;
max-width: 1100px;
margin: 0 auto;
}
.service-card {
background: #fff;
border-radius: 16px;
padding: 40px 30px;
box-shadow: 0 4px 20px rgba(0,0,0,0.06);
transition: transform 0.3s, box-shadow 0.3s;
border: 1px solid #eef0f8;
}
.service-card:hover {
transform: translateY(-6px);
box-shadow: 0 12px 40px rgba(79,142,247,0.15);
}
.service-icon {
width: 60px;
height: 60px;
border-radius: 14px;
display: flex;
align-items: center;
justify-content: center;
font-size: 1.8rem;
margin-bottom: 24px;
}
.icon-blue { background: #e8f0fe; }
.icon-purple { background: #f3e8ff; }
.icon-green { background: #e8faf0; }
.icon-orange { background: #fff3e8; }
.service-card h3 {
font-size: 1.25rem;
color: #0a0a1e;
font-weight: 700;
margin-bottom: 12px;
}
.service-card p {
color: #666;
font-size: 0.95rem;
line-height: 1.7;
}
.service-card .learn-more {
display: inline-block;
margin-top: 20px;
color: #4f8ef7;
font-weight: 600;
font-size: 0.9rem;
text-decoration: none;
}
.service-card .learn-more:hover {
text-decoration: underline;
}
.about {
padding: 100px 20px;
background: #fff;
}
.about-inner {
max-width: 1100px;
margin: 0 auto;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 70px;
align-items: center;
}
.about-image-block {
position: relative;
}
.about-image-box {
background: linear-gradient(135deg, #0d1b4b, #1a0a3e);
border-radius: 20px;
height: 420px;
display: flex;
align-items: center;
justify-content: center;
position: relative;
overflow: hidden;
}
.about-image-box::before {
content: '';
position: absolute;
width: 300px;
height: 300px;
background: radial-gradient(circle, rgba(79,142,247,0.25) 0%, transparent 70%);
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
}
.about-image-box .big-icon {
font-size: 8rem;
position: relative;
z-index: 1;
}
.about-badge {
position: absolute;
bottom: -20px;
right: -20px;
background: linear-gradient(135deg, #4f8ef7, #7c3aed);
color: #fff;
border-radius: 14px;
padding: 18px 24px;
text-align: center;
box-shadow: 0 8px 25px rgba(79,142,247,0.35);
}
.about-badge .big-num {
font-size: 2rem;
font-weight: 800;
display: block;
}
.about-badge .small-text {
font-size: 0.8rem;
opacity: 0.9;
}
.about-content .section-tag {
margin-bottom: 14px;
}
.about-content h2 {
font-size: 2.3rem;
color: #0a0a1e;
font-weight: 800;
line-height: 1.25;
margin-bottom: 20px;
}
.about-content p {
color: #666;
font-size: 1rem;
line-height: 1.8;
margin-bottom: 16px;
}
.about-features {
list-style: none;
margin: 28px 0;
display: flex;
flex-direction: column;
gap: 12px;
}
.about-features li {
display: flex;
align-items: center;
gap: 12px;
color: #444;
font-size: 0.95rem;
}
.check-icon {
width: 24px;
height: 24px;
background: linear-gradient(135deg, #4f8ef7, #7c3aed);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
color: #fff;
font-size: 0.75rem;
flex-shrink: 0;
}
.contact {
padding: 100px 20px;
background: linear-gradient(135deg, #0a0a1e 0%, #0d1b4b 100%);
}
.contact .section-tag {
background: rgba(79,142,247,0.2);
color: #7ab3ff;
}
.contact .section-header h2 {
color: #fff;
}
.contact .section-header p {
color: #aab4c8;
}
.contact-wrapper {
max-width: 900px;
margin: 0 auto;
display: grid;
grid-template-columns: 1fr 1.5fr;
gap: 50px;
}
.contact-info h3 {
color: #fff;
font-size: 1.3rem;
margin-bottom: 24px;
font-weight: 700;
}
.contact-item {
display: flex;
gap: 14px;
align-items: flex-start;
margin-bottom: 24px;
}
.contact-item-icon {
width: 44px;
height: 44px;
background: rgba(79,142,247,0.15);
border: 1px solid rgba(79,142,247,0.3);
border-radius: 10px;
display: flex;
align-items: center;
justify-content: center;
font-size: 1.1rem;
flex-shrink: 0;
}
.contact-item-text span {
display: block;
color: #7a8aaa;
font-size: 0.8rem;
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 4px;
}
.contact-item-text p {
color: #e0e8ff;
font-size: 0.95rem;
}
.contact-form-box {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 20px;
padding: 40px;
}
.form-row {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 16px;
}
.form-group {
margin-bottom: 20px;
}
.form-group label {
display: block;
color: #aab4c8;
font-size: 0.85rem;
margin-bottom: 8px;
font-weight: 500;
}
.form-group input,
.form-group textarea,
.form-group select {
width: 100%;
background: rgba(255,255,255,0.07);
border: 1px solid rgba(255,255,255,0.15);
border-radius: 8px;
padding: 12px 16px;
color: #fff;
font-size: 0.95rem;
font-family: inherit;
transition: border-color 0.3s;
outline: none;
}
.form-group input::placeholder,
.form-group textarea::placeholder {
color: #5a6a8a;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
border-color: #4f8ef7;
background: rgba(79,142,247,0.08);
}
.form-group select option {
background: #0d1b4b;
color: #fff;
}
.form-group textarea {
resize: vertical;
min-height: 120px;
}
.btn-submit {
width: 100%;
background: linear-gradient(135deg, #4f8ef7, #7c3aed);
color: #fff;
padding: 14px;
border: none;
border-radius: 8px;
font-size: 1rem;
font-weight: 700;
cursor: pointer;
transition: transform 0.3s, box-shadow 0.3s;
letter-spacing: 0.5px;
}
.btn-submit:hover {
transform: translateY(-2px);
box-shadow: 0 8px 25px rgba(79,142,247,0.4);
}

background: #05050f;
color: #7a8aaa;
text-align: center;
padding: 30px 20px;
font-size:
